<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Inscrição ENEM</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <nav>

        <a href="painel.html">
            Painel Principal
        </a>

        <a href="cursos.html">
            Verificação de Cursos
        </a>

        <a href="inscricao.html">
            Inscrição
        </a>

        <a href="index.html">
            Sair
        </a>

    </nav>

</header>

<main>

<div class="card">

    <h2>
        Inscrição na Prova
    </h2>

    <!-- Idioma -->
    <label>
        Língua Estrangeira
    </label>

    <select id="idioma">

        <option value="">
            Selecione
        </option>

        <option>
            Inglês
        </option>

        <option>
            Espanhol
        </option>

    </select>

    <!-- Estado -->
    <label>
        Estado
    </label>

    <select id="estado">

        <option value="">
            Selecione
        </option>

        <option>
            São Paulo
        </option>

        <option>
            Rio de Janeiro
        </option>

        <option>
            Minas Gerais
        </option>

    </select>

    <!-- Cidade -->
    <label>
        Cidade
    </label>

    <select id="cidade">

        <option value="">
            Selecione
        </option>

        <option>
            São Paulo
        </option>

        <option>
            Campinas
        </option>

        <option>
            Santos
        </option>

    </select>

    <!-- Atendimento especializado -->
    <label>
        Necessita atendimento especializado?
    </label>

    <select
        id="especial"
        onchange="mostrarNecessidade()">

        <option>
            Não
        </option>

        <option>
            Sim
        </option>

    </select>

    <!-- Campo aparece somente se SIM -->
    <div
        id="campoNecessidade"
        style="display:none">

        <input
            type="text"
            id="necessidade"
            placeholder="Informe sua necessidade">

    </div>

    <!-- Botão de envio -->
    <button onclick="confirmarInscricao()">

        Confirmar Inscrição

    </button>

    <!-- Mensagem de erro ou sucesso -->
    <div id="mensagem">

    </div>

</div>

</main>

<footer>
    © 2026 Portal ENEM
</footer>

<script src="script.js"></script>

</body>

</html>
