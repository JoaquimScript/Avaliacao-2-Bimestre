<!DOCTYPE html>

<!-- Define que o documento utiliza HTML5 -->
<html lang="pt-BR">

<head>

    <!-- Permite acentuação e caracteres especiais -->
    <meta charset="UTF-8">

    <!-- Adapta a página para celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título exibido na aba do navegador -->
    <title>Portal do Candidato - ENEM</title>

    <!-- Conecta o arquivo CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Cabeçalho fixo -->
    <header>
        Portal do Candidato - ENEM
    </header>

    <!-- Conteúdo principal -->
    <main>

        <!-- Card central -->
        <div class="card">

            <!-- Título da área de login -->
            <h2>Login</h2>

            <!-- Campo de e-mail -->
            <input
                type="email"
                id="email"
                placeholder="E-mail">

            <!-- Mensagem de erro do e-mail -->
            <div id="emailErro" class="erro"></div>

            <!-- Campo de senha -->
            <input
                type="password"
                id="senha"
                placeholder="Senha">

            <!-- Mensagem de erro da senha -->
            <div id="senhaErro" class="erro"></div>

            <!-- Botão que executa a função validarLogin() -->
            <button onclick="validarLogin()">
                Entrar
            </button>

            <!-- Botão que leva para o cadastro -->
            <button onclick="window.location.href='cadastro.html'">
                Cadastrar Novo Usuário
            </button>

        </div>

    </main>

    <!-- Rodapé fixo -->
    <footer>
        © 2026 Portal ENEM
    </footer>

    <!-- Conecta o JavaScript -->
    <script src="script.js"></script>

</body>

</html>
