<!DOCTYPE html>

<!-- Documento HTML5 -->
<html lang="pt-BR">

<head>

    <!-- Permite caracteres especiais -->
    <meta charset="UTF-8">

    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Nome exibido na aba -->
    <title>Cadastro ENEM</title>

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Cabeçalho fixo -->
    <header>
        Portal do Candidato - ENEM
    </header>

    <!-- Área principal -->
    <main>

        <!-- Card do formulário -->
        <div class="card">

            <!-- Título -->
            <h2>Cadastro</h2>

            <!-- Nome completo -->
            <input
                id="nome"
                placeholder="Nome Completo">

            <!-- E-mail -->
            <input
                id="emailCad"
                placeholder="E-mail">

            <!-- Mensagem de erro do e-mail -->
            <div id="emailCadErro" class="erro"></div>

            <!-- Telefone -->
            <input
                placeholder="Telefone">

            <!-- Nome da mãe -->
            <input
                placeholder="Nome da Mãe">

            <!-- Nome do pai -->
            <input
                placeholder="Nome do Pai">

            <!-- Rua -->
            <input
                placeholder="Rua/Avenida">

            <!-- Número -->
            <input
                placeholder="Número">

            <!-- Cidade -->
            <input
                placeholder="Cidade">

            <!-- Estado -->
            <input
                placeholder="Estado">

            <!-- País -->
            <input
                placeholder="País">

            <!-- Situação escolar -->
            <select>

                <option>
                    Já concluí
                </option>

                <option>
                    Estou cursando
                </option>

            </select>

            <!-- Tipo de escola -->
            <select>

                <option>
                    Pública
                </option>

                <option>
                    Privada
                </option>

            </select>

            <!-- Senha -->
            <input
                type="password"
                id="senhaCad"
                placeholder="Senha">

            <!-- Erro da senha -->
            <div id="senhaCadErro" class="erro"></div>

            <!-- Confirmar senha -->
            <input
                type="password"
                id="confirmarSenha"
                placeholder="Confirmar Senha">

            <!-- Erro de confirmação -->
            <div id="confirmarErro" class="erro"></div>

            <!-- Salvar inscrição -->
            <button onclick="salvarCadastro()">
                Salvar Inscrição
            </button>

            <!-- Voltar para login -->
            <button onclick="window.location.href='index.html'">
                Voltar
            </button>

        </div>

    </main>

    <!-- Rodapé -->
    <footer>
        © 2026 Portal ENEM
    </footer>

    <!-- Arquivo JavaScript -->
    <script src="script.js"></script>

</body>

</html>
